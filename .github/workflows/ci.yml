name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install validation dependency
        run: python -m pip install fonttools python-docx
      - name: Self test
        run: python scripts/self_test.py
      - name: Type consistency gate
        run: python scripts/check_type_consistency.py
      - name: Language lint smoke test
        run: |
          printf '我局高度重视该项工作，取得显著成效，大家纷纷点赞。\n' > "$RUNNER_TEMP/language.md"
          python scripts/check_language.py "$RUNNER_TEMP/language.md"
      - name: Material dossier smoke test
        run: |
          printf '2026年6月30日，区水利局完成12项排查。计划取得显著成效。\n' > "$RUNNER_TEMP/materials.md"
          python scripts/prepare_dossier.py "$RUNNER_TEMP/materials.md" --task "整理防汛情况专报" -o "$RUNNER_TEMP/dossier.md"
      - name: Policy citation smoke test
        run: |
          python scripts/policy_research.py --topic "公共数据授权运营" --department ndrc.gov.cn --url "https://www.gov.cn/zhengce/content/2026-01/01/content_0000000.htm" -o "$RUNNER_TEMP/policy-ledger.md"
          cat > "$RUNNER_TEMP/citations.md" <<'EOF'
          | 编号 | 文件或讲话标题 | 发布机关 | 文号 | 发布日期 | 来源URL | 来源等级 | 写入正文方式 | 核验状态 |
          | --- | --- | --- | --- | --- | --- | --- | --- | --- |
          | C1 | 国务院关于某项工作的意见 | 国务院 | 国发〔2026〕1号 | 2026年1月1日 | https://www.gov.cn/zhengce/content/2026-01/01/content_0000000.htm | 政策原文 | 作为依据 | 已核实 |
          EOF
          python scripts/check_citations.py "$RUNNER_TEMP/citations.md" --require-citations
      - name: Font asset catalog
        run: python scripts/check_fonts.py --verify-assets
      - name: Build sample offline prompt pack
        run: python scripts/build_prompt_pack.py --doc-type 通知 --task "起草一份通知。" -o "$RUNNER_TEMP/gongwen-draft-prompt.md"

  windows-font-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install fonttools python-docx
      - name: Self test
        run: python scripts/self_test.py
      - name: Font asset catalog
        run: python scripts/check_fonts.py --verify-assets
      - name: Font list smoke test
        run: python scripts/check_fonts.py --list-assets
